# Бэкенд на Render.com — Root Directory: back
services:
  - type: web
    name: lipovoy-api
    runtime: node
    plan: free
    rootDir: back
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        value: lipovoy
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_REGION
        value: eu-north-1
      - key: FRONTEND_URL
        sync: false
